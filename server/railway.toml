[build]
builder = "NIXPACKS"

[deploy]
# 从 server 目录启动
startCommand = "node dist/main.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
# 确保工作目录是 server
workingDir = "."

[deploy.env]
NODE_ENV = "production"

# 添加 Railway 特定配置
[deploy.buildCommand]
# 使用 pnpm 构建命令
command = "pnpm install && pnpm run build"
